# Conexão com o PostgreSQL rodando no Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/danbarber
spring.datasource.username=danbarber
spring.datasource.password=danbarber123
spring.datasource.driver-class-name=org.postgresql.Driver
 
# "update" preserva os dados entre reinicializações (diferente do create-drop do H2)
# Cria/ajusta tabelas automaticamente com base nas entidades, sem apagar dados existentes
spring.jpa.hibernate.ddl-auto=update
 
# Não roda o data.sql toda vez (evita erro de "login duplicado" ao reiniciar,
# já que agora os dados persistem de verdade entre execuções)
spring.sql.init.mode=never
 
# Deixe habilitado só se quiser ver o SQL gerado no console (bom para aprender/debugar)
spring.jpa.show-sql=true
 
# JWT (mantém os mesmos valores de antes)
jwt.secret=minhaChaveSecretaSuperLongaParaAssinarTokensJWTComSeguranca123456
jwt.expiration=86400000
