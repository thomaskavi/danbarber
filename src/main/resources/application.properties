# O Render define a porta via variável de ambiente PORT; localmente cai em 8080
server.port=${PORT:8080}

# Conexão com o banco — em produção, essas variáveis vêm do ambiente de hospedagem.
# Localmente, se você não definir as variáveis, usa os valores depois dos ":" (seu Docker local).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/danbarber}
spring.datasource.username=${DB_USERNAME:danbarber}
spring.datasource.password=${DB_PASSWORD:danbarber123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=false

# JWT — o valor de fallback aqui é só pra você continuar rodando localmente sem configurar nada.
# EM PRODUÇÃO, defina JWT_SECRET como uma variável de ambiente real.
jwt.secret=${JWT_SECRET:minhaChaveSecretaSuperLongaParaAssinarTokensJWTComSeguranca123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

# URL do frontend liberada no CORS — em produção, aponta pro seu domínio real do Angular.
# Localmente cai no localhost:4200, que é onde o ng serve roda.
app.frontend-url=${FRONTEND_URL:http://localhost:4200}
